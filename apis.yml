aid: lambda
name: Lambda
description: >-
  Lambda gives your team instant access to the compute you need to build and deploy
  Artificial Intelligence. Lambda Cloud provides on-demand GPU instances powered
  by NVIDIA A100, H100, and other high-performance GPUs for deep learning training
  and inference workloads.
type: Index
position: Consumer
access: 3rd-Party
