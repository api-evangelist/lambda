apis:
  - aid: lambda:cloud-api
    name: Lambda Cloud API
    description: >-
      The Lambda Cloud API allows you to manage GPU cloud instances
      programmatically. You can launch, list, restart, and terminate instances,
      manage SSH keys, list available instance types and images, and manage
      persistent storage file systems through a RESTful interface.
    humanURL: https://docs.lambda.ai/public-cloud/cloud-api/
    baseURL: https://cloud.lambdalabs.com/api/v1
    tags:
      - Cloud
      - Compute
      - File Systems
      - GPU
      - Instances
      - SSH Keys
    properties:
