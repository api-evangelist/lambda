naftiko: 1.0.0-alpha2
info:
  label: Lambda Cloud API — Instance Types
  description: 'Lambda Cloud API — Instance Types. 1 operations. Lead operation: List Instance Types. Self-contained Naftiko
    capability covering one Lambda business surface.'
  tags:
  - Lambda
  - Instance Types
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LAMBDA_API_KEY: LAMBDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-instance-types
    baseUri: https://cloud.lambdalabs.com/api/v1
    description: Lambda Cloud API — Instance Types business capability. Self-contained, no shared references.
    resources:
    - name: instance-types
      path: /instance-types
      operations:
      - name: listinstancetypes
        method: GET
        description: List Instance Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.LAMBDA_USER}}'
      password: '{{env.LAMBDA_PASS}}'
