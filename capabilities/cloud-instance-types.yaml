    resources:
    - path: /v1/instance-types
      name: instance-types
      description: REST surface for instance-types.
      operations:
      - method: GET
        name: listinstancetypes
        description: List Instance Types
        call: cloud-instance-types.listinstancetypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-instance-types-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lambda Cloud API — Instance Types. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-instance-types
      description: List Instance Types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-instance-types.listinstancetypes
      outputParameters:
      - type: object
        mapping: $.
