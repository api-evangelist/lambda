extends:
  - spectral:oas
rules:
  lambda-operation-summary-title-case:
    description: Operation summaries must use Title Case.
    severity: warn
    given: $.paths[*][*].summary
    then:
      function: pattern
      functionOptions:
        match: ^[A-Z][a-zA-Z]+(\\s[A-Z][a-zA-Z]+)*$

  lambda-data-envelope:
    description: Response bodies should use the data envelope pattern.
    severity: warn
    given: $.paths[*][*].responses['200'].content['application/json'].schema.properties
    then:
      field: data
      function: truthy

  lambda-auth-required:
    description: All endpoints must require authentication.
    severity: error
    given: $.paths[*][*]
    then:
      - field: security
        function: truthy

  lambda-operation-id-required:
    description: All operations must have an operationId.
    severity: error
    given: $.paths[*][*]
    then:
      field: operationId
      function: truthy

  lambda-instance-id-format:
    description: Instance IDs should be string type.
    severity: info
    given: $.components.schemas.Instance.properties.id
    then:
      field: type
      function: enumeration
      functionOptions:
        values:
          - string

  lambda-description-required:
    description: All operations must have a description.
    severity: error
    given: $.paths[*][*]
    then:
      field: description
      function: truthy

  lambda-tags-required:
    description: All operations must have at least one tag.
    severity: warn
    given: $.paths[*][*]
    then:
      field: tags
      function: truthy
