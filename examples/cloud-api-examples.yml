title: Lambda Cloud API Examples
description: Example request/response pairs for the Lambda Cloud API.
examples:
  - name: List Running Instances
    operation: listInstances
    request:
      method: GET
      path: /api/v1/instances
      headers:
        Authorization: Basic YOUR_API_KEY
    response:
      status: 200
      body:
        data:
          - id: 0920582c7ff041399e34823a0be62549
            name: training-node-1
            ip: 10.10.10.1
            status: active
            ssh_key_names:
              - my-ssh-key
            file_system_names:
              - my-file-system
            region:
              name: us-tx-3
              description: Austin, Texas
            instance_type:
              name: gpu_1x_a100_sxm4
              description: 1x A100 SXM4 (40 GB)
            hostname: 10-0-8-196.cloud.lambdalabs.com
            jupyter_token: 2c60c3b5a671060bc6148900a3ac7a42
            jupyter_url: https://jupyter-2c60c3b5a671060bc6148900a3ac7a42.cloud.lambdalabs.com

  - name: Launch An Instance
    operation: launchInstance
    request:
      method: POST
      path: /api/v1/instance-operations/launch
      headers:
        Authorization: Basic YOUR_API_KEY
        Content-Type: application/json
      body:
        region_name: us-tx-3
        instance_type_name: gpu_1x_a100_sxm4
        ssh_key_names:
          - my-ssh-key
        file_system_names:
          - my-file-system
        quantity: 1
        name: training-node-1
    response:
      status: 200
      body:
        data:
          instance_ids:
            - 0920582c7ff041399e34823a0be62549

  - name: Terminate Instances
    operation: terminateInstances
    request:
      method: POST
      path: /api/v1/instance-operations/terminate
      headers:
        Authorization: Basic YOUR_API_KEY
        Content-Type: application/json
      body:
        instance_ids:
          - 0920582c7ff041399e34823a0be62549
    response:
      status: 200
      body:
        data:
          terminated_instances:
            - id: 0920582c7ff041399e34823a0be62549
              status: terminated

  - name: List Instance Types
    operation: listInstanceTypes
    request:
      method: GET
      path: /api/v1/instance-types
      headers:
        Authorization: Basic YOUR_API_KEY
    response:
      status: 200
      body:
        data:
          gpu_1x_a100_sxm4:
            instance_type:
              name: gpu_1x_a100_sxm4
              description: 1x A100 SXM4 (40 GB)
              price_cents_per_hour: 110
              specs:
                vcpus: 24
                memory_gib: 85
                storage_gib: 512
            regions_with_capacity_available:
              - name: us-tx-3
                description: Austin, Texas

  - name: Add SSH Key
    operation: addSshKey
    request:
      method: POST
      path: /api/v1/ssh-keys
      headers:
        Authorization: Basic YOUR_API_KEY
        Content-Type: application/json
      body:
        name: my-ssh-key
        public_key: ssh-rsa AAAAB3NzaC1yc2EAAA...
    response:
      status: 200
      body:
        data:
          id: ssh-key-12345
          name: my-ssh-key
          public_key: ssh-rsa AAAAB3NzaC1yc2EAAA...
          private_key: null

  - name: List File Systems
    operation: listFileSystems
    request:
      method: GET
      path: /api/v1/file-systems
      headers:
        Authorization: Basic YOUR_API_KEY
    response:
      status: 200
      body:
        data:
          - id: fs-12345
            name: my-file-system
            created: '2026-01-15T10:30:00Z'
            mount_point: /home/ubuntu/shared
            region:
              name: us-tx-3
              description: Austin, Texas
